services:
  - type: web
    name: ecobazaar-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: ECO-BAZAAR-X/ecobazaarbackend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/ecobazaarbackend-0.0.1-SNAPSHOT.jar"
    healthCheckPath: /api/auth/test
    envVars:
      - key: DB_URL
        sync: false          # You will enter this manually in Render dashboard
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # Set to your Vercel URL after frontend deploy
      - key: JAVA_VERSION
        value: "21"
