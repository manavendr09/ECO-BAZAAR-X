spring.application.name=ecobazaarbackend

# ─────────────────────────────────────────────
# Database — values injected via environment variables
# (Set these in Render dashboard or local .env)
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ─────────────────────────────────────────────
# Server — Render sets PORT automatically
# ─────────────────────────────────────────────
server.port=${PORT:8081}

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ─────────────────────────────────────────────
# Mail (OTP Support)
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─────────────────────────────────────────────
# CORS — comma-separated list of allowed origins
# Example: https://ecobazaar.vercel.app,http://localhost:5173
# ─────────────────────────────────────────────
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173}

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.com.ecobazaarx=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.apache.tomcat=WARN

# ─────────────────────────────────────────────
# Jackson
# ─────────────────────────────────────────────
spring.jackson.serialization.fail-on-empty-beans=false

# ─────────────────────────────────────────────
# Hikari Connection Pool
# ─────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
